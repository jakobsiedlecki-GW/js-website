name: Update vita

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python - <<'PY'
          from pathlib import Path
          import re

          app = Path('src/App.jsx')
          if app.exists():
              text = app.read_text(encoding='utf-8')
              new_timeline = """const timeline = [
  ['06/2021', 'Ernennung zum Professor an der LMU München'],
  ['seit 2024', 'Zusätzliche Tätigkeit in der Praxis Dr. Vlachou-Vaterrodt, Grünwald'],
  ['2023 bis 2024', 'Tätigkeit in der Augenarztpraxis Fokus Auge, Rosenheim'],
  ['10/2021', 'Ernennung zum Oberarzt für ophthalmologische Vorder- und Hinterabschnittschirurgie mit Schwerpunkt Linsen- und Netzhautchirurgie sowie medikamentöser Makulatherapie'],
  ['08/2021', 'Habilitation im Fach Augenheilkunde an der LMU München und Ernennung zum Privatdozenten'],
  ['03/2021', 'Facharztanerkennung und FEBO'],
  ['2019', 'Experimentelle Promotion (summa cum laude) zur Therapieoptimierung der feuchten AMD'],
  ['2015 bis 2021', 'Weiterbildung zum Facharzt für Augenheilkunde an der Augenklinik und Poliklinik des Klinikums der Universität München'],
  ['2015', 'Staatsexamen und Approbation als Arzt'],
  ['2008 bis 2015', 'Medizinstudium an der LMU München und der Technischen Universität München'],
]"""
              text = re.sub(r"const timeline = \[.*?\n\]", new_timeline, text, flags=re.S)
              app.write_text(text, encoding='utf-8')

          index = Path('index.html')
          if index.exists():
              text = index.read_text(encoding='utf-8')
              old = '<div class="inner-item"><strong>seit 2023</strong>Zusätzliche Tätigkeit in der Praxis Dr. Vlachou-Vaterrodt, Grünwald</div>'
              new = '<div class="inner-item"><strong>06/2021</strong>Ernennung zum Professor an der LMU München</div><div class="inner-item"><strong>seit 2024</strong>Zusätzliche Tätigkeit in der Praxis Dr. Vlachou-Vaterrodt, Grünwald</div><div class="inner-item"><strong>2023 bis 2024</strong>Tätigkeit in der Augenarztpraxis Fokus Auge, Rosenheim</div>'
              if old in text:
                  text = text.replace(old, new)
              else:
                  marker = '<div class="inner-list">'
                  insert = marker + new
                  if 'Ernennung zum Professor an der LMU München' not in text and marker in text:
                      text = text.replace(marker, insert, 1)
              index.write_text(text, encoding='utf-8')
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add src/App.jsx index.html
          git diff --cached --quiet || git commit -m "Update medical career timeline"
          git push
