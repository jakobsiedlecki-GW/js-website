name: Fix video title short

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -c "from pathlib import Path; p=Path('index.html'); s=p.read_text(encoding='utf-8'); s=s.replace('PD Dr. Siedlecki','Prof. Siedlecki').replace('PD Dr. med. Siedlecki','Prof. Siedlecki').replace('Prof. Dr. med. Siedlecki','Prof. Siedlecki'); p.write_text(s, encoding='utf-8')"
      - run: rm .github/workflows/fix-video-title-short.yml
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html .github/workflows/fix-video-title-short.yml
          git diff --cached --quiet || git commit -m "Shorten video title"
          git push
