name: Fix visible title

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -c "from pathlib import Path; p=Path('index.html'); s=p.read_text(encoding='utf-8').replace('PD Dr. med. Siedlecki','Prof. Dr. med. Siedlecki'); p.write_text(s, encoding='utf-8')"
      - run: rm .github/workflows/fix-visible-title.yml
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html .github/workflows/fix-visible-title.yml
          git diff --cached --quiet || git commit -m "Fix visible professor title"
          git push
