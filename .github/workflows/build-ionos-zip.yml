name: Build IONOS ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build static website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build prerendered website
        run: npm run build

      - name: Create upload ZIP
        run: |
          cd dist
          zip -r ../eyepinion-ionos-upload.zip .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: eyepinion-ionos-upload
          path: eyepinion-ionos-upload.zip
          if-no-files-found: error
