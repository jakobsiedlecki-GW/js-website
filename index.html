<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline = TRUE</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      main {
        width: min(90vw, 720px);
        padding: 48px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.76);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      }

      .status {
        margin: 0;
        font-size: clamp(32px, 8vw, 82px);
        line-height: 1;
        letter-spacing: -0.06em;
      }

      .label {
        color: var(--muted);
      }

      .value {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 0.12em;
      }

      .hint {
        margin: 24px 0 0;
        color: var(--muted);
        font-size: clamp(14px, 2vw, 18px);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main aria-label="Website-Status">
      <h1 class="status"><span class="label">Offline =</span> <span class="value">TRUE</span></h1>
      <p class="hint">Diese Website ist vorübergehend offline.</p>
    </main>
  </body>
</html>
