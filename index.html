<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Dr. med. Jakob Siedlecki, FEBO</title>
    <script id="Cookiebot" src="https://consent.cookiebot.com/uc.js" data-cbid="a4803ca2-b2e7-41be-b470-a25a10eb4dad" data-blockingmode="auto" type="text/javascript"></script>
    <style>
      .highlight-box.with-image {
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .highlight-box.with-image::before {
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.08), rgba(15, 23, 42, 0.18));
      }
      .highlight-box.with-image .highlight-label {
        left: 16px;
        right: 16px;
        bottom: 16px;
        width: auto;
        padding: 9px 13px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.35;
        background: rgba(255, 255, 255, 0.82);
      }
      .ai-image-notice {
        margin-top: 18px;
        color: #475569;
        line-height: 1.8;
      }
      .ai-image-notice strong {
        color: #0f172a;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (() => {
        const highlightTextReplacements = {
          'Linsenchirurgie (Grauer Star, "Katarakt")': 'Linsenchirurgie (Grauer Star)',
          'Glaukomdiagnostik und -therapie': 'Betreuung bei Glaukom (Grüner Star)',
          'Netzhaut- und Makulachirurgie (Epiretinale Gliose, Makulaforamen u.v.m.)': 'Netzhaut- und Makulachirurgie (Epiretinale Gliose, Makulaforamen)',
        }

        const focusImages = {
          'Linsenchirurgie (Grauer Star)': '/GR.png',
          'Makula-Therapie (IVOM, Laser, Diagnostik)': '/IV.png',
          'Augenärztliche Vorsorge (Sehfehler, Brillenverordnung u.v.m.)': '/VO.png',
          'Betreuung bei Glaukom (Grüner Star)': '/GL.png',
          'Netzhaut- und Makulachirurgie (Epiretinale Gliose, Makulaforamen)': '/MA.png',
          'Therapie des Trockenen Auges': '/TR.png',
          'Lasertherapie': '/LA.png',
          'Hornhauterkrankungen': '/HH.png',
          'Zweitmeinung': '/ZW.png',
        }

        const addAiImageNotice = () => {
          const legalSection = document.getElementById('impressum')
          if (!legalSection || legalSection.querySelector('.ai-image-notice')) return

          const legalCards = [...legalSection.querySelectorAll('.card-body')]
          const legalNoticeCard = legalCards.find((card) => card.textContent.includes('Rechtliche Hinweise'))
          if (!legalNoticeCard) return

          const notice = document.createElement('div')
          notice.className = 'ai-image-notice'
          notice.innerHTML = '<strong>Hinweis zu Bildmaterial</strong><br />Bei allen Fotos und Abbildungen wurden mithilfe von KI patientenindividuelle Merkmale entfernt beziehungsweise anonymisiert.'
          legalNoticeCard.appendChild(notice)
        }

        const updateLegalFooterLinks = () => {
          const footer = document.querySelector('.legal-footnote')
          if (!footer) return

          const links = footer.querySelectorAll('a, button')
          links.forEach((item) => {
            if (item.textContent.trim() === 'Impressum') {
              const link = document.createElement('a')
              link.href = '/impressum.html'
              link.textContent = 'Impressum'
              item.replaceWith(link)
            }

            if (item.textContent.trim() === 'Datenschutz') {
              const link = document.createElement('a')
              link.href = '/datenschutz.html'
              link.textContent = 'Datenschutz'
              item.replaceWith(link)
            }
          })
        }

        const applyFocusImages = () => {
          document.querySelectorAll('.highlight-label').forEach((label) => {
            const originalLabelText = label.textContent.trim()
            const labelText = highlightTextReplacements[originalLabelText] || originalLabelText
            const imageUrl = focusImages[labelText]
            const box = label.closest('.highlight-box')

            if (labelText !== originalLabelText) {
              label.textContent = labelText
            }

            if (!box || !imageUrl) return

            box.classList.add('with-image')
            box.style.backgroundImage = `url("${imageUrl}")`
          })

          addAiImageNotice()
          updateLegalFooterLinks()
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', applyFocusImages)
        } else {
          applyFocusImages()
        }

        window.setTimeout(applyFocusImages, 250)
      })()
    </script>
  </body>
</html>
