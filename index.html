<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Dr. med. Jakob Siedlecki, FEBO</title>
    <script id="Cookiebot" src="https://consent.cookiebot.com/uc.js" data-cbid="a4803ca2-b2e7-41be-b470-a25a10eb4dad" data-blockingmode="auto" type="text/javascript"></script>
    <style>
      .highlight-box.with-image {
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .highlight-box.with-image::before {
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.08), rgba(15, 23, 42, 0.18));
      }
      .highlight-box.with-image .highlight-label {
        left: 16px;
        right: 16px;
        bottom: 16px;
        width: auto;
        padding: 9px 13px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.35;
        background: rgba(255, 255, 255, 0.82);
      }
      .google-scholar-visible-link {
        display: block;
        margin-top: 8px;
        color: #2563eb;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .ai-image-notice,
      .liability-insurance-notice {
        margin-top: 18px;
        color: #475569;
        line-height: 1.8;
      }
      .ai-image-notice strong,
      .liability-insurance-notice strong {
        color: #0f172a;
        font-weight: 600;
      }
      .video-info-banner {
        margin-top: 12px !important;
        padding: 11px 12px !important;
        border-radius: 14px !important;
        font-size: 13px !important;
        line-height: 1.45 !important;
      }
      .video-info-banner strong {
        margin-bottom: 3px !important;
        font-size: 14px !important;
      }
      .video-title {
        box-sizing: border-box !important;
        display: grid !important;
        place-items: center !important;
        height: 92px !important;
        min-height: 92px !important;
        padding: 0 24px !important;
        text-align: center !important;
        line-height: 1.35 !important;
        color: #6b8f88 !important;
        background: #ffffff !important;
        border-top: 1px solid #d8e6e2 !important;
      }
      @media (max-width: 760px) {
        .video-frame {
          aspect-ratio: auto !important;
          min-height: 280px !important;
        }
        .video-placeholder {
          aspect-ratio: auto !important;
          min-height: 280px !important;
          align-items: stretch !important;
        }
        .video-placeholder-content {
          display: flex !important;
          flex-direction: column !important;
          justify-content: center !important;
          padding: 18px !important;
        }
        .video-placeholder-title {
          font-size: 17px !important;
          line-height: 1.35 !important;
        }
        .video-placeholder-text {
          max-height: 104px !important;
          overflow-y: auto !important;
          margin-top: 8px !important;
          font-size: 13px !important;
          line-height: 1.45 !important;
          -webkit-overflow-scrolling: touch !important;
        }
        .video-activate {
          display: inline-flex !important;
          align-items: center !important;
          justify-content: center !important;
          width: fit-content !important;
          min-height: 44px !important;
          margin: 14px auto 0 !important;
          padding: 11px 18px !important;
          flex: 0 0 auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (() => {
        const highlightTextReplacements = {
          'Linsenchirurgie (Grauer Star, "Katarakt")': 'Linsenchirurgie (Grauer Star)',
          'Glaukomdiagnostik und -therapie': 'Betreuung bei Glaukom (Grüner Star)',
          'Netzhaut- und Makulachirurgie (Epiretinale Gliose, Makulaforamen u.v.m.)': 'Netzhaut- und Makulachirurgie (Epiretinale Gliose, Makulaforamen)',
        }

        const focusImages = {
          'Linsenchirurgie (Grauer Star)': '/GR.png',
          'Makula-Therapie (IVOM, Laser, Diagnostik)': '/IV.png',
          'Augenärztliche Vorsorge (Sehfehler, Brillenverordnung u.v.m.)': '/VO.png',
          'Betreuung bei Glaukom (Grüner Star)': '/GL.png',
          'Netzhaut- und Makulachirurgie (Epiretinale Gliose, Makulaforamen)': '/MA.png',
          'Therapie des Trockenen Auges': '/TR.png',
          'Lasertherapie': '/LA.png',
          'Hornhauterkrankungen': '/HH.png',
          'Zweitmeinung': '/ZW.png',
        }

        const imageNoticeText = 'Bei Fotos und Abbildungen können anonymisierte oder synthetisch ergänzte/veränderte Darstellungen vorliegen. Patientenindividuelle Merkmale wurden entfernt oder mithilfe von KI ersetzt. Eine Ähnlichkeit mit realen Personen ist nicht beabsichtigt.'
        const profileFocusText = 'Mein Schwerpunkt liegt auf evidenzbasierter Augenheilkunde mit besonderem Fokus auf moderner Diagnostik und Bildgebung, minimalinvasiver Augenchirurgie sowie der Langzeitbetreuung chronischer Erkrankungen (Altersbedingte Makuladegeneration, Grüner Star, Hornhauterkrankungen, u.v.m.).'

        const getLegalCards = () => {
          const legalSection = document.getElementById('impressum')
          if (!legalSection) return []
          return [...legalSection.querySelectorAll('.card-body')]
        }

        const updateProfileFocusText = () => {
          const headings = [...document.querySelectorAll('div')]
          const heading = headings.find((item) => item.textContent.trim() === 'Behandlung mit Fokus auf Präzision')
          if (!heading) return

          const paragraph = heading.parentElement?.querySelector('p')
          if (paragraph) {
            paragraph.textContent = profileFocusText
          }
        }

        const updateGoogleScholarLink = () => {
          const link = document.querySelector('a[href*="scholar.google.com/citations"]')
          if (!link) return

          const previousNode = link.previousSibling
          const nextNode = link.nextSibling

          if (previousNode?.nodeType === Node.TEXT_NODE) {
            previousNode.textContent = previousNode.textContent.replace(/\s*\($/, '')
          }

          if (nextNode?.nodeType === Node.TEXT_NODE) {
            nextNode.textContent = nextNode.textContent.replace(/^\)/, '')
          }

          link.textContent = 'Link zu Google Scholar'
          link.classList.add('google-scholar-visible-link')
        }

        const addLiabilityInsuranceNotice = () => {
          const impressumCard = getLegalCards().find((card) => card.textContent.includes('Gesetzliche Pflichtangaben'))
          if (!impressumCard || impressumCard.querySelector('.liability-insurance-notice')) return

          const notice = document.createElement('div')
          notice.className = 'liability-insurance-notice'
          notice.innerHTML = '<strong>Berufshaftpflichtversicherung</strong><br />Deutsche Ärzteversicherung<br />Allgemeine Zweigniederlassung der AXA Versicherung AG<br />Colonia-Allee 10-20<br />51067 Köln<br />Telefon: 0221/148-22700<br />Fax: 0221/148-21442'
          impressumCard.appendChild(notice)
        }

        const addAiImageNotice = () => {
          const legalNoticeCard = getLegalCards().find((card) => card.textContent.includes('Rechtliche Hinweise'))
          if (!legalNoticeCard) return

          let notice = legalNoticeCard.querySelector('.ai-image-notice')
          if (!notice) {
            notice = document.createElement('div')
            notice.className = 'ai-image-notice'
            legalNoticeCard.appendChild(notice)
          }
          notice.innerHTML = '<strong>Hinweis zu Bildmaterial</strong><br />' + imageNoticeText
        }

        const updateLegalFooterLinks = () => {
          const footer = document.querySelector('.legal-footnote')
          if (!footer) return

          const links = footer.querySelectorAll('a, button')
          links.forEach((item) => {
            if (item.textContent.trim() === 'Impressum') {
              const link = document.createElement('a')
              link.href = '/impressum.html'
              link.textContent = 'Impressum'
              item.replaceWith(link)
            }

            if (item.textContent.trim() === 'Datenschutz') {
              const link = document.createElement('a')
              link.href = '/datenschutz.html'
              link.textContent = 'Datenschutz'
              item.replaceWith(link)
            }
          })
        }

        const applyFocusImages = () => {
          document.querySelectorAll('.highlight-label').forEach((label) => {
            const originalLabelText = label.textContent.trim()
            const labelText = highlightTextReplacements[originalLabelText] || originalLabelText
            const imageUrl = focusImages[labelText]
            const box = label.closest('.highlight-box')

            if (labelText !== originalLabelText) {
              label.textContent = labelText
            }

            if (!box || !imageUrl) return

            box.classList.add('with-image')
            box.style.backgroundImage = `url("${imageUrl}")`
          })

          updateProfileFocusText()
          updateGoogleScholarLink()
          addLiabilityInsuranceNotice()
          addAiImageNotice()
          updateLegalFooterLinks()
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', applyFocusImages)
        } else {
          applyFocusImages()
        }

        window.setTimeout(applyFocusImages, 250)
      })()
    </script>
    <script src="/video-section-fix.js"></script>
  </body>
</html>
